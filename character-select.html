<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>STICK BRAWL — Select Fighter</title>
  <link rel="stylesheet" href="css/pages.css">
  <style>
    * { cursor:none !important; }
    html,body { width:100%;height:100%;overflow:hidden; }

    #bgCv  { position:fixed;inset:0;z-index:0;pointer-events:none; }
    #charCv{ position:fixed;inset:0;z-index:1;pointer-events:none; }
    #fxCv  { position:fixed;inset:0;z-index:8;pointer-events:none; }

    #c-dot { position:fixed;z-index:9999;pointer-events:none;width:10px;height:10px;
      border-radius:50%;margin:-5px 0 0 -5px;background:#818cf8;
      box-shadow:0 0 14px #4f46e5,0 0 5px #fff;transition:transform .12s,background .2s; }
    #c-dot.on { transform:scale(2.2);background:#fff; }
    #c-ring { position:fixed;z-index:9998;pointer-events:none;width:38px;height:38px;
      border-radius:50%;margin:-19px 0 0 -19px;border:1.5px solid rgba(99,102,241,.55);
      transition:width .3s,height .3s,border-color .3s,margin .3s; }
    #c-ring.on { width:62px;height:62px;margin:-31px 0 0 -31px;border-color:rgba(99,102,241,.9); }

    /* ── INFO PANEL ─────────────────────────── */
    #infoPanel {
      position:fixed;left:0;top:0;bottom:0;width:44%;z-index:5;
      background:linear-gradient(to right,rgba(5,8,16,.97) 68%,rgba(5,8,16,0));
      padding:22px 52px 85px 30px;
      display:flex;flex-direction:column;
      pointer-events:all;
      overflow:hidden;
    }
    .ip-header { display:flex;align-items:center;gap:12px;margin-bottom:18px;flex-shrink:0; }

    #ipClass {
      font-size:9px;font-weight:900;letter-spacing:4px;
      padding:3px 10px;border-radius:4px;
      border:1.5px solid var(--col,#818cf8);color:var(--col,#818cf8);
      display:inline-block;flex-shrink:0;
    }
    #ipName {
      font-size:44px;font-weight:900;line-height:.9;
      margin:10px 0 10px;flex-shrink:0;
    }
    #ipDesc {
      font-size:12px;color:rgba(255,255,255,.45);line-height:1.6;
      margin-bottom:16px;flex-shrink:0;
    }

    .ip-section-title {
      font-size:8px;font-weight:900;letter-spacing:3px;color:#334155;
      margin-bottom:8px;flex-shrink:0;
    }
    .stat-row {
      display:flex;align-items:center;gap:8px;margin-bottom:7px;flex-shrink:0;
    }
    .stat-row .lbl { font-size:9px;font-weight:700;letter-spacing:1.5px;color:#475569;width:36px;flex-shrink:0; }
    .stat-row .bar { flex:1;height:5px;background:#1e293b;border-radius:3px;overflow:hidden; }
    .stat-row .fill{ height:100%;border-radius:3px;width:0; }
    .stat-row .num { font-size:11px;font-weight:900;width:16px;text-align:right; }

    .abil-list { display:flex;flex-direction:column;gap:6px;margin-top:2px;overflow:hidden; }
    .abil-item {
      display:flex;align-items:center;gap:10px;
      padding:8px 11px;border-radius:8px;
      border:1px solid rgba(255,255,255,.07);
      background:rgba(255,255,255,.04);
      flex-shrink:0;
    }
    .abil-icon { font-size:15px;flex-shrink:0;width:20px;text-align:center; }
    .abil-body {}
    .abil-name { font-size:11px;font-weight:700;color:#e2e8f0; }
    .abil-desc { font-size:9px;color:rgba(255,255,255,.38);margin-top:1px;line-height:1.3; }

    /* ── BOTTOM NAV ─────────────────────────── */
    #bottomNav {
      position:fixed;bottom:0;left:44%;right:0;z-index:5;
      padding:14px 24px 18px;
      display:flex;align-items:center;justify-content:center;gap:16px;
      background:linear-gradient(to top,rgba(5,8,16,.92) 55%,transparent);
    }
    .nav-arrow {
      width:40px;height:40px;border-radius:50%;
      background:rgba(30,41,59,.7);border:1.5px solid rgba(51,65,85,.6);
      color:#94a3b8;font-size:16px;
      cursor:pointer;display:flex;align-items:center;justify-content:center;
      transition:all .2s;flex-shrink:0;
    }
    .nav-arrow:hover { border-color:var(--ncol,#4f46e5);color:var(--ncol,#818cf8);background:rgba(79,70,229,.15); }

    .char-thumbs { display:flex;gap:10px; }
    .char-thumb {
      width:62px;height:62px;border-radius:12px;
      border:2px solid rgba(51,65,85,.5);background:rgba(15,23,42,.8);
      cursor:pointer;transition:all .25s;
      display:flex;align-items:center;justify-content:center;
      position:relative;overflow:hidden;
    }
    .char-thumb:hover { border-color:#475569;transform:translateY(-3px); }
    .char-thumb.current { border-color:var(--col,#4f46e5);box-shadow:0 0 18px var(--col,#4f46e5)44;transform:translateY(-4px) scale(1.06); }
    .char-thumb svg { width:46px;height:56px; }
    .thumb-badge {
      position:absolute;top:3px;right:3px;
      font-size:7px;font-weight:900;letter-spacing:1px;padding:2px 4px;border-radius:3px;
      display:none;
    }
    .char-thumb.p1 .badge-p1 { display:block;background:rgba(79,70,229,.85);color:#fff; }
    .char-thumb.p2 .badge-p2 { display:block;background:rgba(220,38,38,.85);color:#fff; }

    .btn-random {
      width:40px;height:40px;border-radius:50%;
      background:rgba(30,41,59,.7);border:1.5px solid rgba(51,65,85,.6);
      color:#94a3b8;font-size:17px;
      cursor:pointer;display:flex;align-items:center;justify-content:center;
      transition:all .2s;flex-shrink:0;
      title:'Random';
    }
    .btn-random:hover { border-color:#f59e0b;color:#fbbf24;background:rgba(245,158,11,.15); }

    /* ── FOOTER ─────────────────────────────── */
    #csFooter {
      position:fixed;bottom:0;left:0;width:44%;z-index:5;
      padding:14px 30px 18px;
      background:linear-gradient(to top,rgba(5,8,16,.97) 75%,transparent);
    }
    .sel-row { display:flex;gap:8px;margin-bottom:8px; }
    .sel-box {
      flex:1;background:rgba(15,23,42,.7);border:1.5px solid rgba(51,65,85,.4);
      border-radius:9px;padding:7px 12px;transition:border-color .3s;
    }
    .sel-box.filled-p1 { border-color:rgba(79,70,229,.6); }
    .sel-box.filled-p2 { border-color:rgba(220,38,38,.6); }
    .sel-lbl { font-size:8px;font-weight:900;letter-spacing:2px;margin-bottom:1px; }
    .sel-val { font-size:11px;font-weight:700;color:#475569;transition:color .3s; }
    .sel-box.filled-p1 .sel-val { color:#818cf8; }
    .sel-box.filled-p2 .sel-val { color:#f87171; }
    #csHint { font-size:9px;color:#334155;text-align:center;margin-bottom:8px; }
    #startBtn { width:100%; }

    /* ── MAP SELECT OVERLAY ─────────────────── */
    #mapOverlay {
      position:fixed;inset:0;z-index:50;
      background:rgba(5,8,16,.96);
      display:none;align-items:center;justify-content:center;
      flex-direction:column;
      backdrop-filter:blur(10px);
    }
    #mapOverlay.show { display:flex; animation:pgFadeIn .3s ease both; }

    .mso-inner {
      display:flex;flex-direction:column;align-items:center;
      gap:22px;padding:28px 36px;
      max-width:960px;width:100%;
    }
    .mso-header { text-align:center; }
    .mso-tag {
      font-size:9px;font-weight:900;letter-spacing:4px;color:#334155;
      margin-bottom:8px;
    }
    .mso-title {
      font-size:36px;font-weight:900;letter-spacing:2px;
      background:linear-gradient(135deg,#818cf8,#fff,#818cf8);
      -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
      margin-bottom:5px;
    }
    .mso-sub { font-size:11px;color:#475569;letter-spacing:1.5px; }

    .mso-cards { display:flex;gap:14px;width:100%; }
    .mso-card {
      flex:1;border-radius:14px;
      border:2px solid rgba(51,65,85,.5);
      background:rgba(15,23,42,.8);
      cursor:pointer;overflow:hidden;
      transition:all .25s;
      display:flex;flex-direction:column;
    }
    .mso-card:hover {
      border-color:var(--mcol,#818cf8);
      box-shadow:0 0 28px var(--mcol,#818cf8);
      transform:translateY(-4px) scale(1.02);
    }
    .mso-card-preview {
      width:100%;height:120px;display:block;
      opacity:.72;transition:opacity .25s;object-fit:fill;
    }
    .mso-card:hover .mso-card-preview { opacity:.95; }
    .mso-card-body { padding:13px 15px 16px; }
    .mso-card-tag {
      font-size:8px;font-weight:900;letter-spacing:3px;
      color:var(--mcol,#818cf8);margin-bottom:5px;
    }
    .mso-card-name {
      font-size:16px;font-weight:900;letter-spacing:1px;
      color:#e2e8f0;margin-bottom:5px;
    }
    .mso-card-desc { font-size:10px;color:#475569;line-height:1.55; }

    .mso-footer { display:flex;gap:12px;align-items:center;margin-top:2px; }
    .mso-btn-random {
      padding:11px 28px;border-radius:10px;
      background:rgba(245,158,11,.12);border:1.5px solid rgba(245,158,11,.4);
      color:#fbbf24;font-size:12px;font-weight:700;letter-spacing:1.5px;
      cursor:pointer;transition:all .2s;
    }
    .mso-btn-random:hover { background:rgba(245,158,11,.22);border-color:#f59e0b;box-shadow:0 0 18px rgba(245,158,11,.3); }
    .mso-btn-back {
      padding:11px 22px;border-radius:10px;
      background:rgba(51,65,85,.35);border:1.5px solid rgba(51,65,85,.5);
      color:#64748b;font-size:11px;font-weight:700;letter-spacing:1px;
      cursor:pointer;transition:all .2s;
    }
    .mso-btn-back:hover { border-color:#475569;color:#94a3b8; }

    /* ── LOADING OVERLAY ────────────────────── */
    #loadOverlay {
      position:fixed;inset:0;z-index:100;
      background:#050810;
      display:none;align-items:center;justify-content:center;
      flex-direction:column;gap:0;
    }
    #loadOverlay.show { display:flex; animation:pgFadeIn .35s ease both; }
    #loadCv { position:absolute;inset:0; }
    .load-content { position:relative;z-index:1;text-align:center; }
    .load-vs {
      font-size:72px;font-weight:900;letter-spacing:4px;
      background:linear-gradient(135deg,#818cf8,#fff,#818cf8);
      -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
      filter:drop-shadow(0 0 40px rgba(79,70,229,.8));
      animation:titleGlitch 3s step-end infinite;
      margin-bottom:8px;
    }
    .load-names {
      display:flex;gap:80px;justify-content:center;align-items:center;
      margin-bottom:32px;
    }
    .load-name { font-size:13px;font-weight:900;letter-spacing:3px; }
    .load-name.p1 { color:#818cf8; }
    .load-name.p2 { color:#f87171; }
    .load-bar-wrap { width:280px;height:4px;background:#1e293b;border-radius:2px;overflow:hidden;margin:0 auto; }
    .load-bar { height:100%;width:0;border-radius:2px;background:linear-gradient(90deg,#4f46e5,#818cf8);transition:width .05s linear; }
    .load-hint { font-size:10px;color:#334155;letter-spacing:2px;margin-top:12px; animation:blink 1s ease-in-out infinite; }
  </style>
</head>
<body>

  <div id="c-dot"></div>
  <div id="c-ring"></div>

  <canvas id="bgCv"></canvas>
  <canvas id="charCv"></canvas>
  <canvas id="fxCv"></canvas>

  <!-- Info panel -->
  <div id="infoPanel">
    <div class="ip-header">
      <button class="back-btn" onclick="SB.navigate('main-menu.html')">← Back</button>
      <div class="mode-badge" id="modeBadge">VS AI</div>
    </div>

    <div id="ipClass">SPELL CASTER</div>
    <h1 id="ipName" style="color:#4f46e5">ARCANE MAGE</h1>
    <p  id="ipDesc">A balanced master of elemental magic.</p>

    <div class="ip-section-title">STATS</div>
    <div class="stat-row"><span class="lbl">POW</span><div class="bar"><div class="fill" id="sf0" style="background:#ef4444"></div></div><span class="num" id="sn0" style="color:#ef4444">3</span></div>
    <div class="stat-row"><span class="lbl">SPD</span><div class="bar"><div class="fill" id="sf1" style="background:#22c55e"></div></div><span class="num" id="sn1" style="color:#22c55e">3</span></div>
    <div class="stat-row"><span class="lbl">MAG</span><div class="bar"><div class="fill" id="sf2" style="background:#6366f1"></div></div><span class="num" id="sn2" style="color:#6366f1">5</span></div>
    <div class="stat-row"><span class="lbl">DEF</span><div class="bar"><div class="fill" id="sf3" style="background:#f59e0b"></div></div><span class="num" id="sn3" style="color:#f59e0b">2</span></div>

    <div class="ip-section-title" style="margin-top:14px">ABILITIES</div>
    <div class="abil-list">
      <div class="abil-item"><span class="abil-icon" id="ai0">🔥</span><div class="abil-body"><div class="abil-name" id="an0"></div><div class="abil-desc" id="ad0"></div></div></div>
      <div class="abil-item"><span class="abil-icon" id="ai1">❄</span> <div class="abil-body"><div class="abil-name" id="an1"></div><div class="abil-desc" id="ad1"></div></div></div>
      <div class="abil-item"><span class="abil-icon" id="ai2">⚡</span><div class="abil-body"><div class="abil-name" id="an2"></div><div class="abil-desc" id="ad2"></div></div></div>
    </div>
  </div>

  <!-- Footer selection info -->
  <div id="csFooter">
    <div class="sel-row">
      <div class="sel-box" id="p1Box"><div class="sel-lbl" style="color:#4f46e5">P1</div><div class="sel-val" id="p1Val">— Choose —</div></div>
      <div class="sel-box" id="p2Box"><div class="sel-lbl" style="color:#dc2626">P2</div><div class="sel-val" id="p2Val">— Choose —</div></div>
    </div>
    <div id="csHint">Click = P1 &nbsp;·&nbsp; Right-click = P2 &nbsp;·&nbsp; Press Enter to confirm</div>
    <button class="btn-big" id="startBtn" onclick="window._startBattle()" disabled>⚔ &nbsp;START BATTLE</button>
  </div>

  <!-- Bottom navigation -->
  <div id="bottomNav">
    <button class="nav-arrow" id="prevBtn" onclick="window._changeChar(-1)" title="Previous">◄</button>
    <div class="char-thumbs" id="thumbsRow"></div>
    <button class="nav-arrow" id="nextBtn" onclick="window._changeChar(1)"  title="Next">►</button>
    <button class="btn-random" onclick="window._randomChar()" title="Random">🎲</button>
  </div>

  <!-- Map select overlay -->
  <div id="mapOverlay">
    <div class="mso-inner">
      <div class="mso-header">
        <div class="mso-tag">STEP 2 OF 2</div>
        <h2 class="mso-title">SELECT ARENA</h2>
        <p class="mso-sub">Choose your battlefield</p>
      </div>
      <div class="mso-cards" id="msoCards"></div>
      <div class="mso-footer">
        <button class="mso-btn-random" onclick="window._randomMap()">🎲 &nbsp;RANDOM ARENA</button>
        <button class="mso-btn-back" onclick="window._closeMapSelect()">← &nbsp;Back</button>
      </div>
    </div>
  </div>

  <!-- Loading screen overlay -->
  <div id="loadOverlay">
    <canvas id="loadCv"></canvas>
    <div class="load-content">
      <div class="load-vs">VS</div>
      <div class="load-names">
        <div class="load-name p1" id="loadP1"></div>
        <div class="load-name p2" id="loadP2"></div>
      </div>
      <div class="load-bar-wrap"><div class="load-bar" id="loadBar"></div></div>
      <div class="load-hint">LOADING BATTLE...</div>
    </div>
  </div>

  <script src="js/shared.js"></script>
  <script src="js/music.js"></script>
  <script>
  (function(){
    'use strict';

    /* ── Character data ─────────────────────────── */
    const CHARS = [
      {
        id:'mage', name:'ARCANE MAGE', cls:'SPELL CASTER',
        col:'#4f46e5', col2:'#818cf8',
        desc:'Balanced master of all spells. Commands fire, ice, and arcane forces with equal mastery.',
        stats:{pow:3,spd:3,mag:5,def:2},
        abilities:[
          {icon:'🔥',name:'Charged Fire',   desc:'Hold J — charge and release a massive fireball'},
          {icon:'❄',name:'Ice Wall',        desc:'K — Summon a frozen barrier that slows enemies'},
          {icon:'⚡',name:'Arcane Nova',    desc:'ULTIMATE — 8 bolts radiate in all directions'},
        ],
      },
      {
        id:'brawler', name:'IRON BRAWLER', cls:'MELEE FIGHTER',
        col:'#dc2626', col2:'#f87171',
        desc:'Slow but devastating. Each punch shakes the earth. Absolute dominance at close range.',
        stats:{pow:5,spd:2,mag:1,def:5},
        abilities:[
          {icon:'👊',name:'Iron Fist',      desc:'Space — Massive melee punch with huge knockback'},
          {icon:'🛡',name:'Parry Counter',  desc:'S — Perfect deflection stuns the attacker'},
          {icon:'💥',name:'Ground Slam',    desc:'ULTIMATE — Shockwave rings erupt from the ground'},
        ],
      },
      {
        id:'ninja', name:'SHADOW NINJA', cls:'SHADOW ASSASSIN',
        col:'#a855f7', col2:'#d8b4fe',
        desc:'Elusive and unpredictable. Teleports at will and strikes before enemies can react.',
        stats:{pow:2,spd:5,mag:3,def:2},
        abilities:[
          {icon:'🌀',name:'Blink Dash',     desc:'E — Instant teleport dash through space'},
          {icon:'❄',name:'Ice Wall',        desc:'K — Place terrain control barrier'},
          {icon:'⚡',name:'Shadow Rush',    desc:'ULTIMATE — Teleport to target then triple strike'},
        ],
      },
    ];

    /* ── Canvas setup ───────────────────────────── */
    const bgCv=document.getElementById('bgCv'), bgCtx=bgCv.getContext('2d');
    const cCv =document.getElementById('charCv'),cCtx =cCv.getContext('2d');
    const fxCv=document.getElementById('fxCv'), fxCtx =fxCv.getContext('2d');
    let W,H;
    function resize(){W=bgCv.width=cCv.width=fxCv.width=innerWidth;H=bgCv.height=cCv.height=fxCv.height=innerHeight;}
    resize(); addEventListener('resize',resize);
    const T0=Date.now(); function sec(){return(Date.now()-T0)*.001;}

    /* ── Mouse ──────────────────────────────────── */
    let mx=W/2,my=H/2,ringX=W/2,ringY=H/2;
    const dot=document.getElementById('c-dot'),ring=document.getElementById('c-ring');
    addEventListener('mousemove',e=>{mx=e.clientX;my=e.clientY;dot.style.left=mx+'px';dot.style.top=my+'px';});

    /* ── Mode ───────────────────────────────────── */
    const MODE=SB.getMode();
    document.getElementById('modeBadge').textContent={vs:'VS AI',survival:'SURVIVAL',versus:'2 PLAYER'}[MODE]||MODE;

    /* ── Selection state ────────────────────────── */
    let curIdx=0, p1=-1, p2=-1;

    /* ── Walk state ─────────────────────────────── */
    let charX      = W*0.88;
    const TARGET_X = ()=> W*0.70;
    let charState  = 'ENTERING';
    let exitDir=1, pendingIdx=-1, pendingSelectPlayer=-1;

    /* ── Stars ──────────────────────────────────── */
    const STARS=Array.from({length:150},()=>({
      x:Math.random()*9999,y:Math.random()*H*.88,
      r:Math.random()*1.5+.2,tw:Math.random()*Math.PI*2,ts:.008+Math.random()*.02,
    }));

    /* ── Helpers ────────────────────────────────── */
    function ln(c,x1,y1,x2,y2){c.beginPath();c.moveTo(x1,y1);c.lineTo(x2,y2);c.stroke();}
    function circ(c,x,y,r,fill,gl,gr){
      if(gl){c.shadowBlur=gr||14;c.shadowColor=gl;}
      c.beginPath();c.arc(x,y,r,0,Math.PI*2);
      if(fill){c.fillStyle=fill;c.fill();}else c.stroke();
      c.shadowBlur=0;
    }
    function hexA(hex,a){
      const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
      return `rgba(${r},${g},${b},${a})`;
    }

    /* ── Draw background ────────────────────────── */
    function drawBG(){
      bgCtx.clearRect(0,0,W,H);
      const g=bgCtx.createLinearGradient(0,0,0,H);
      g.addColorStop(0,'#050810');g.addColorStop(1,'#0a0d18');
      bgCtx.fillStyle=g;bgCtx.fillRect(0,0,W,H);
      STARS.forEach(s=>{
        s.tw+=s.ts;
        const a=.08+Math.sin(s.tw)*.22;
        bgCtx.save();bgCtx.globalAlpha=Math.max(0,a);bgCtx.fillStyle='#e2e8f0';
        bgCtx.beginPath();bgCtx.arc(s.x%W,s.y,s.r,0,Math.PI*2);bgCtx.fill();bgCtx.restore();
      });
    }

    /* ── Draw stage / spotlight ─────────────────── */
    function drawStage(){
      const c=CHARS[curIdx];
      const gy=H*.60;    // ground line — higher up so character visible

      /* Spotlight cone */
      const sg=cCtx.createLinearGradient(charX,0,charX,gy);
      sg.addColorStop(0,'rgba(0,0,0,0)');
      sg.addColorStop(.55,hexA(c.col,.05));
      sg.addColorStop(1,hexA(c.col,.18));
      cCtx.fillStyle=sg;
      cCtx.beginPath();
      cCtx.moveTo(charX-5,0);cCtx.lineTo(charX-190,gy);cCtx.lineTo(charX+190,gy);cCtx.lineTo(charX+5,0);
      cCtx.closePath();cCtx.fill();

      /* Floor pool */
      const fp=cCtx.createRadialGradient(charX,gy,0,charX,gy,190);
      fp.addColorStop(0,hexA(c.col,.24));fp.addColorStop(1,'rgba(0,0,0,0)');
      cCtx.fillStyle=fp;cCtx.fillRect(charX-190,gy-20,380,80);

      /* Stage glow line */
      const gl=cCtx.createLinearGradient(W*.44,gy,W,gy);
      gl.addColorStop(0,'rgba(0,0,0,0)');gl.addColorStop(.3,hexA(c.col,.6));
      gl.addColorStop(.7,hexA(c.col,.6));gl.addColorStop(1,'rgba(0,0,0,0)');
      cCtx.strokeStyle=gl;cCtx.lineWidth=1.5;
      cCtx.beginPath();cCtx.moveTo(W*.44,gy);cCtx.lineTo(W,gy);cCtx.stroke();

      /* Character shadow */
      cCtx.save();cCtx.globalAlpha=.4;
      const sh=cCtx.createRadialGradient(charX,gy+4,0,charX,gy+4,70);
      sh.addColorStop(0,'rgba(0,0,0,.8)');sh.addColorStop(1,'rgba(0,0,0,0)');
      cCtx.fillStyle=sh;cCtx.scale(1,.22);
      cCtx.beginPath();cCtx.arc(charX,(gy+4)/.22,70,0,Math.PI*2);cCtx.fill();
      cCtx.restore();
    }

    /* ── Draw character ─────────────────────────── */
    function drawChar(t){
      const c=CHARS[curIdx];
      const SC=3.0;
      const gy=H*.60;
      const isWalk=(charState!=='IDLE');
      const wF=isWalk?6:1.5, wA=isWalk?22:5, aA=isWalk?18:4;
      const legL=Math.sin(t*wF)*wA, legR=-Math.sin(t*wF)*wA;
      const bob=isWalk?Math.abs(Math.sin(t*wF))*-3:Math.sin(t*1.5)*4;
      const pulse=.55+.45*Math.sin(t*3.5);

      cCtx.save();
      cCtx.translate(charX,gy+bob);

      /* Aura */
      const aura=cCtx.createRadialGradient(0,-15,6,0,-15,80*SC);
      aura.addColorStop(0,hexA(c.col,.22));aura.addColorStop(1,'rgba(0,0,0,0)');
      cCtx.fillStyle=aura;cCtx.beginPath();cCtx.arc(0,-15,80*SC,0,Math.PI*2);cCtx.fill();

      cCtx.scale(SC,SC);cCtx.lineCap='round';

      /* ── MAGE ─────────────────────────────────── */
      if(c.id==='mage'){
        /* Legs */
        cCtx.strokeStyle='#94a3b8';cCtx.lineWidth=2.5;
        ln(cCtx,0,14,-12+legL,50-Math.abs(Math.sin(t*wF))*6*(isWalk?1:0));
        ln(cCtx,0,14, 12+legR,50-Math.abs(Math.sin(t*wF+Math.PI))*6*(isWalk?1:0));
        /* Body */
        cCtx.strokeStyle='#e2e8f0';cCtx.lineWidth=2.5;ln(cCtx,0,-15,0,14);
        /* Left arm */
        cCtx.strokeStyle='#cbd5e1';cCtx.lineWidth=2.2;
        const la=-2.2+Math.sin(t*(isWalk?6:1))*((isWalk?0.5:0.1));
        ln(cCtx,0,-8,Math.cos(la)*22,-8+Math.abs(Math.sin(la))*20);
        /* Staff arm */
        const raA=isWalk?(-0.5+Math.sin(t*6)*.35):-0.44+Math.sin(t*.75)*.07;
        const raX=Math.cos(raA)*26,raY=-8+Math.sin(raA)*26;
        ln(cCtx,0,-8,raX,raY);
        /* Staff */
        const sX=raX+Math.cos(raA)*26,sY=raY+Math.sin(raA)*26;
        cCtx.strokeStyle=c.col;cCtx.lineWidth=3.5;cCtx.shadowBlur=12;cCtx.shadowColor=c.col;
        ln(cCtx,raX,raY,sX,sY);
        /* Orb */
        const orbR=isWalk?7:10+pulse*6;
        circ(cCtx,sX,sY,orbR,c.col,c.col,isWalk?12:18+pulse*28);
        if(!isWalk){
          cCtx.globalAlpha=.4+pulse*.4;cCtx.fillStyle='#fff';cCtx.shadowBlur=0;
          circ(cCtx,sX,sY,orbR*.35,'#fff');cCtx.globalAlpha=1;
          cCtx.strokeStyle=c.col2;cCtx.lineWidth=1.5;
          cCtx.globalAlpha=.35+pulse*.3;cCtx.shadowBlur=8;cCtx.shadowColor=c.col2;
          circ(cCtx,sX,sY,orbR+8+Math.sin(t*5)*5,null);cCtx.globalAlpha=1;cCtx.shadowBlur=0;
        }

      /* ── BRAWLER ───────────────────────────────── */
      } else if(c.id==='brawler'){
        /* Wide legs */
        cCtx.strokeStyle='#94a3b8';cCtx.lineWidth=3;
        ln(cCtx,0,16,-18+legL,52);ln(cCtx,0,16,18+legR,52);
        /* Body */
        cCtx.strokeStyle='#e2e8f0';cCtx.lineWidth=3;ln(cCtx,0,-17,0,16);
        /* Fists (guard) */
        const gb=Math.sin(t*4)*3;
        const lFX=-22+(isWalk?Math.sin(t*6)*18:0),lFY=-18+gb;
        const rFX=-18+(isWalk?-Math.sin(t*6)*15:0),rFY=-8-gb;
        const fR=11.5+Math.sin(t*5)*1.5;
        cCtx.strokeStyle='#cbd5e1';cCtx.lineWidth=2.5;
        cCtx.shadowBlur=12;cCtx.shadowColor=c.col;
        ln(cCtx,0,-8,lFX,lFY);circ(cCtx,lFX,lFY,fR,c.col,c.col,16);
        ln(cCtx,0,-8,rFX,rFY);circ(cCtx,rFX,rFY,fR-1,c.col,c.col,13);
        cCtx.shadowBlur=0;
        if(!isWalk){
          cCtx.globalAlpha=.28+Math.sin(t*3)*.12;cCtx.strokeStyle=c.col2;cCtx.lineWidth=1.5;
          cCtx.shadowBlur=8;cCtx.shadowColor=c.col2;
          circ(cCtx,lFX,lFY,fR+8+Math.sin(t*4.5)*5,null);
          cCtx.globalAlpha=1;cCtx.shadowBlur=0;
        }

      /* ── NINJA ─────────────────────────────────── */
      } else {
        /* Crouched legs */
        cCtx.strokeStyle='#94a3b8';cCtx.lineWidth=2.2;
        ln(cCtx,0,10,-14+legL,46);ln(cCtx,0,10,14+legR,46);
        /* Body */
        cCtx.strokeStyle='#e2e8f0';cCtx.lineWidth=2.2;ln(cCtx,4,-14,-4,10);
        /* Blade arm */
        const baA=isWalk?(-0.3+Math.sin(t*6)*.4):-0.35+Math.sin(t*.9)*.06;
        const baX=Math.cos(baA)*24,baY=-7+Math.sin(baA)*24;
        cCtx.strokeStyle='#cbd5e1';cCtx.lineWidth=2;ln(cCtx,4,-8,baX,baY);
        const blX=baX+Math.cos(baA)*16,blY=baY+Math.sin(baA)*16;
        cCtx.strokeStyle=c.col;cCtx.lineWidth=2.5;cCtx.shadowBlur=10;cCtx.shadowColor=c.col;
        ln(cCtx,baX,baY,blX,blY);
        if(!isWalk){
          cCtx.globalAlpha=.35;cCtx.strokeStyle=c.col2;cCtx.lineWidth=1;
          cCtx.setLineDash([3,4]);ln(cCtx,blX,blY,blX+12,blY-18);cCtx.setLineDash([]);cCtx.globalAlpha=1;
        }
        cCtx.shadowBlur=0;
        ln(cCtx,4,-8,-18+(isWalk?Math.sin(t*6)*-18:0),-5);
      }

      /* Head (all chars) */
      const hR=c.id==='brawler'?16:13;
      cCtx.strokeStyle=c.col;cCtx.lineWidth=2.5;cCtx.shadowBlur=10;cCtx.shadowColor=c.col;
      circ(cCtx,0,-30,hR,'#0f172a');cCtx.stroke();cCtx.shadowBlur=0;
      cCtx.fillStyle=c.col2;
      circ(cCtx,4,-32,2.5,c.col2);circ(cCtx,9,-32,2.5,c.col2);

      cCtx.restore();
    }

    /* ── Particles ──────────────────────────────── */
    const parts=[];
    let lastPartT=0;
    function spawnParts(x,y,col,n){
      for(let i=0;i<n;i++){
        const a=Math.random()*Math.PI*2,s=2+Math.random()*5;
        parts.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s-2,r:Math.random()*3+.5,
          c:col,life:0,max:25+Math.random()*20,grav:.1});
      }
    }

    /* ── Update panel ───────────────────────────── */
    function showPanel(idx){
      const c=CHARS[idx];

      /* Color variable */
      document.getElementById('infoPanel').style.setProperty('--col',c.col);

      /* Text */
      const cls=document.getElementById('ipClass');
      cls.textContent=c.cls;
      cls.style.color=c.col;
      cls.style.borderColor=hexA(c.col,.6);

      const nm=document.getElementById('ipName');
      nm.textContent=c.name;
      nm.style.color=c.col;

      document.getElementById('ipDesc').textContent=c.desc;

      /* Stats */
      const skeys=['pow','spd','mag','def'];
      skeys.forEach((k,i)=>{
        const val=c.stats[k];
        document.getElementById('sn'+i).textContent=val;
        const fill=document.getElementById('sf'+i);
        fill.style.transition='none';fill.style.width='0';
        setTimeout(()=>{fill.style.transition='width .9s cubic-bezier(.22,1,.36,1)';fill.style.width=(val/5*100)+'%';},250+i*90);
      });

      /* Abilities */
      c.abilities.forEach((ab,i)=>{
        const ico=document.getElementById('ai'+i);if(ico)ico.textContent=ab.icon||'⚡';
        document.getElementById('an'+i).textContent=ab.name;
        document.getElementById('ad'+i).textContent=ab.desc;
      });

      /* Stagger animate panel elements */
      const els=['ipClass','ipName','ipDesc'];
      const abilEls=document.querySelectorAll('.abil-item');
      const statEls=document.querySelectorAll('.stat-row');
      const allEls=[...els.map(id=>document.getElementById(id)),...statEls,...abilEls];
      allEls.forEach((el,i)=>{
        if(!el)return;
        el.style.transition='none';el.style.opacity='0';el.style.transform='translateX(-12px)';
        setTimeout(()=>{
          el.style.transition='opacity .32s ease, transform .32s ease';
          el.style.opacity='1';el.style.transform='none';
        },70+i*45);
      });

      /* Arrow colors */
      document.getElementById('prevBtn').style.setProperty('--ncol',c.col);
      document.getElementById('nextBtn').style.setProperty('--ncol',c.col);
    }

    /* ── Build thumbnails ───────────────────────── */
    function buildThumbs(){

        `<svg viewBox="0 0 60 80"><circle cx="30" cy="11" r="11" fill="#0f172a" stroke="#dc2626" stroke-width="2"/><line x1="30" y1="22" x2="30" y2="54" stroke="#e2e8f0" stroke-width="2.5"/><line x1="30" y1="32" x2="4" y2="22" stroke="#cbd5e1" stroke-width="2"/><circle cx="4" cy="22" r="9" fill="#dc2626"/><line x1="30" y1="32" x2="56" y2="22" stroke="#cbd5e1" stroke-width="2"/><circle cx="56" cy="22" r="9" fill="#dc2626"/><line x1="30" y1="54" x2="14" y2="78" stroke="#94a3b8" stroke-width="2.5"/><line x1="30" y1="54" x2="46" y2="78" stroke="#94a3b8" stroke-width="2.5"/></svg>`,
        `<svg viewBox="0 0 60 80"><circle cx="30" cy="12" r="8" fill="#0f172a" stroke="#a855f7" stroke-width="2"/><line x1="30" y1="20" x2="28" y2="46" stroke="#e2e8f0" stroke-width="2"/><line x1="30" y1="28" x2="54" y2="20" stroke="#cbd5e1" stroke-width="1.8"/><line x1="54" y1="20" x2="62" y2="36" stroke="#a855f7" stroke-width="2.5"/><line x1="30" y1="28" x2="8" y2="22" stroke="#cbd5e1" stroke-width="1.8"/><line x1="28" y1="46" x2="14" y2="70" stroke="#94a3b8" stroke-width="2"/><line x1="28" y1="46" x2="42" y2="72" stroke="#94a3b8" stroke-width="2"/></svg>`,
      ];
      CHARS.forEach((c,i)=>{
        const d=document.createElement('div');

        d.innerHTML=svgs[i]+`<div class="thumb-badge badge-p1">P1</div><div class="thumb-badge badge-p2">P2</div>`;
        d.addEventListener('click',()=>navigateTo(i,1));
        d.addEventListener('contextmenu',e=>{e.preventDefault();navigateTo(i,2);});
        d.addEventListener('mouseenter',()=>{dot.classList.add('on');ring.classList.add('on');});
        d.addEventListener('mouseleave',()=>{dot.classList.remove('on');ring.classList.remove('on');});

    function updateThumbs(){
      document.querySelectorAll('.char-thumb').forEach((t,i)=>{
        t.classList.toggle('current',i===curIdx);
        t.classList.toggle('p1',i===p1);
        t.classList.toggle('p2',i===p2);
      });
    }

    /* ── Navigate to a character ────────────────── */
    function navigateTo(idx, autoSelectPlayer){
      if(idx===curIdx){
        // Already on this char — just select
        if(autoSelectPlayer) selectChar(autoSelectPlayer,idx);
        return;
      }
      if(charState!=='IDLE') return;
      exitDir = idx>curIdx ? 1 : -1;
      pendingIdx = idx;
      pendingSelectPlayer = autoSelectPlayer||-1;
      charState = 'EXITING';
    }

    /* ── Change char by direction ───────────────── */
    function changeChar(dir){
      if(charState!=='IDLE') return;
      navigateTo((curIdx+dir+3)%3);
    }

    /* ── Select character ───────────────────────── */
    function selectChar(player,idx){
      if(player===1){
        p1=idx;
        // In non-versus modes, AI is assigned automatically (but can be same)
        if(MODE!=='versus') p2=(idx+1)%3;
        document.getElementById('p1Val').textContent=CHARS[p1].name;
        document.getElementById('p1Val').style.color=CHARS[p1].col;
        document.getElementById('p1Box').classList.add('filled-p1');
        if(p2>=0){
          const p2name=MODE==='versus'?CHARS[p2].name:'(AI) '+CHARS[p2].name;
          document.getElementById('p2Val').textContent=p2name;
          document.getElementById('p2Val').style.color=CHARS[p2].col;
          document.getElementById('p2Box').classList.add('filled-p2');
        }
        spawnParts(W*.7,H*.6,CHARS[idx].col,18);
      } else {
        if(MODE!=='versus') return;
        p2=idx; // allow same char as p1
        document.getElementById('p2Val').textContent=CHARS[p2].name;
        document.getElementById('p2Val').style.color=CHARS[p2].col;
        document.getElementById('p2Box').classList.add('filled-p2');
        spawnParts(W*.7,H*.6,CHARS[idx].col,12);
      }
      updateThumbs();
      const ready=p1>=0&&(MODE!=='versus'||p2>=0);
      document.getElementById('startBtn').disabled=!ready;
    }

    /* ── Random character ───────────────────────── */
    function randomChar(){
      const idx=Math.floor(Math.random()*3);
      navigateTo(idx,1);
    }

    /* ── Map select data ────────────────────────── */
    const MAP_CARDS_DATA = [
      {
        name: 'NEON ARENA',
        tag:  'CYBERPUNK',
        desc: 'Neon platforms over a futuristic city. A maglev train crosses the arena periodically.',
        col:  '#00eeff',

      },
      {
        name: 'STORM PEAK',
        tag:  'THUNDERSTORM',
        desc: 'Cloud platforms in a raging storm. Lightning strikes can shock fighters.',
        col:  '#94a3b8',
        idx:  1,
      },
      {

    function buildMapCards() {

    function drawMapPreview(idx) {
      const cv = document.getElementById('mpCv' + idx);
      if (!cv) return;
      const c = cv.getContext('2d');
      const CW = cv.width, CH = cv.height;

      if (idx === 0) {
        /* Neon Arena */
        const sky = c.createLinearGradient(0,0,0,CH);
        sky.addColorStop(0,'#000208'); sky.addColorStop(1,'#001020');
        c.fillStyle = sky; c.fillRect(0,0,CW,CH);
        /* Grid */
        c.strokeStyle = 'rgba(0,238,255,.05)'; c.lineWidth = 1;
        for(let y=0;y<CH;y+=12){c.beginPath();c.moveTo(0,y);c.lineTo(CW,y);c.stroke();}
        for(let x=0;x<CW;x+=12){c.beginPath();c.moveTo(x,0);c.lineTo(x,CH);c.stroke();}
        /* Building silhouettes */
        [[0,38,52],[58,46,40],[104,30,50],[160,40,38],[208,24,52],[260,38,42]].forEach(([bx,bh,bw])=>{
          c.fillStyle='rgba(0,22,44,0.75)'; c.fillRect(bx,CH-bh,bw,bh);
          /* Window dots */
          c.fillStyle='rgba(0,238,255,.3)';
          for(let wy=CH-bh+4;wy<CH-4;wy+=8)
            for(let wx=bx+4;wx<bx+bw-4;wx+=8)
              if((wx+wy)%16>4){c.beginPath();c.arc(wx,wy,1.2,0,Math.PI*2);c.fill();}
        });
        /* Platforms */
        [[18,74,60],[100,52,72],[210,74,58],[60,38,78]].forEach(([px,py,pw])=>{
          c.fillStyle='rgba(0,10,25,.9)'; c.fillRect(px,py,pw,5);
          c.strokeStyle='#00eeff'; c.lineWidth=1.5;
          c.shadowBlur=9; c.shadowColor='#00eeff';
          c.beginPath(); c.moveTo(px,py+1); c.lineTo(px+pw,py+1); c.stroke();
          c.shadowBlur=0;
        });
        /* Floor */
        const fg=c.createLinearGradient(0,CH-5,0,CH);
        fg.addColorStop(0,'#001828'); fg.addColorStop(1,'#000a16');
        c.fillStyle=fg; c.fillRect(0,CH-5,CW,5);
        c.strokeStyle='rgba(0,238,255,.5)'; c.lineWidth=1;
        c.shadowBlur=7; c.shadowColor='#00eeff';
        c.beginPath(); c.moveTo(0,CH-5); c.lineTo(CW,CH-5); c.stroke();
        c.shadowBlur=0;

      } else if (idx === 1) {
        /* Storm Peak */
        const sky = c.createLinearGradient(0,0,0,CH);
        sky.addColorStop(0,'#04040c'); sky.addColorStop(1,'#060812');
        c.fillStyle=sky; c.fillRect(0,0,CW,CH);
        /* Rain streaks */
        c.strokeStyle='rgba(170,210,240,.18)'; c.lineWidth=1;
        for(let i=0;i<30;i++){
          const rx=((i*43)%CW), ry=((i*29)%CH);
          c.beginPath(); c.moveTo(rx,ry); c.lineTo(rx+1.4,ry+9); c.stroke();
        }
        /* Storm clouds bg */
        for(let i=0;i<5;i++){
          const cx=(i*65+10)%CW, cy=10+i*7;
          c.save(); c.globalAlpha=0.3;
          const cg=c.createRadialGradient(cx,cy,0,cx,cy,45);
          cg.addColorStop(0,'#14141e'); cg.addColorStop(1,'rgba(8,8,14,0)');
          c.fillStyle=cg; c.beginPath(); c.ellipse(cx,cy,45,20,0,0,Math.PI*2); c.fill();
          c.restore();
        }
        /* Cloud platforms */
        [[18,74,60],[100,52,72],[210,74,60]].forEach(([px,py,pw])=>{
          const numC=Math.floor(pw/18)+1, spc=pw/numC;
          c.fillStyle='#d1d5db'; c.shadowBlur=12; c.shadowColor='rgba(210,230,255,.8)';
          for(let i=0;i<=numC;i++){c.beginPath(); c.arc(px+i*spc,py+5,8,0,Math.PI*2); c.fill();}
          c.fillStyle='#e8ecf0'; c.shadowBlur=6;
          for(let i=0;i<numC;i++){c.beginPath(); c.arc(px+(i+.5)*spc,py-2,5,0,Math.PI*2); c.fill();}
          c.shadowBlur=0;
        });
        /* Rocky floor */
        c.fillStyle='#0e0c14';
        c.beginPath(); c.moveTo(0,CH);
        for(let x=0;x<=CW;x+=8) c.lineTo(x,CH-5+Math.sin(x*.09)*3);
        c.lineTo(CW,CH); c.closePath(); c.fill();

      } else {
        /* Volcanic Temple */
        const sky=c.createLinearGradient(0,0,0,CH);
        sky.addColorStop(0,'#0d0200'); sky.addColorStop(.6,'#1a0400'); sky.addColorStop(1,'#3d0800');
        c.fillStyle=sky; c.fillRect(0,0,CW,CH);
        /* Ambient lava light */
        const ambG=c.createRadialGradient(CW/2,CH,.0,CW/2,CH,CH*1.1);
        ambG.addColorStop(0,'rgba(255,60,0,0.22)'); ambG.addColorStop(1,'rgba(0,0,0,0)');
        c.fillStyle=ambG; c.fillRect(0,0,CW,CH);
        /* Volcano silhouette */
        const VCX=CW*.5, VPY=CH*.12;
        c.fillStyle='#1c0a04';
        c.beginPath();
        c.moveTo(VCX-CW*.28,CH-16);
        c.lineTo(VCX-22,VPY+4);
        c.lineTo(VCX,VPY-4);
        c.lineTo(VCX+22,VPY+4);
        c.lineTo(VCX+CW*.28,CH-16);
        c.closePath(); c.fill();
        /* Caldera glow */
        const cg=c.createRadialGradient(VCX,VPY,0,VCX,VPY,40);
        cg.addColorStop(0,'rgba(255,200,30,.9)'); cg.addColorStop(.4,'rgba(255,80,0,.5)'); cg.addColorStop(1,'rgba(0,0,0,0)');
        c.fillStyle=cg; c.fillRect(VCX-40,VPY-28,80,40);
        /* Stone platforms */
        [[14,74,58],[160,52,66],[192,74,56]].forEach(([px,py,pw])=>{
          const sg=c.createLinearGradient(0,py,0,py+7);
          sg.addColorStop(0,'#3d1506'); sg.addColorStop(1,'#220a03');
          c.fillStyle=sg; c.fillRect(px,py,pw,7);
          c.strokeStyle='rgba(255,80,0,.65)'; c.lineWidth=1.5;
          c.shadowBlur=7; c.shadowColor='#ff4400';
          c.beginPath(); c.moveTo(px,py+1); c.lineTo(px+pw,py+1); c.stroke();
          c.shadowBlur=0;
        });
        /* Lava floor */
        const lg=c.createLinearGradient(0,CH-14,0,CH);
        lg.addColorStop(0,'#ff4400'); lg.addColorStop(.4,'#cc2200'); lg.addColorStop(1,'#660000');
        c.fillStyle=lg; c.shadowBlur=14; c.shadowColor='#ff6600';
        c.beginPath(); c.moveTo(0,CH-14);
        for(let x=0;x<=CW;x+=5) c.lineTo(x,CH-14+Math.sin(x*.048)*4);
        c.lineTo(CW,CH); c.lineTo(0,CH); c.closePath(); c.fill();
        c.shadowBlur=0;
        /* Floor strip */
        const fs=c.createLinearGradient(0,CH-6,0,CH);
        fs.addColorStop(0,'#2a0c04'); fs.addColorStop(1,'#150602');
        c.fillStyle=fs; c.fillRect(0,CH-6,CW,6);
      }
    }

    /* ── Show map select ────────────────────────── */
    function showMapSelect() {
      buildMapCards();
      document.getElementById('mapOverlay').classList.add('show');
    }

    /* ── Start battle — now shows map select first ── */
    function startBattle(){
      const finalP1 = p1>=0 ? p1 : curIdx;
      const finalP2 = p2>=0 ? p2 : (finalP1+1)%3;
      SB.setP1(finalP1); SB.setP2(finalP2);
      showMapSelect();
    }

    /* ── After map is chosen, run loading + navigate ── */
    function _launchBattle(){
      const finalP1 = SB.getP1();
      const finalP2 = SB.getP2();

      /* Show loading overlay */
      const overlay = document.getElementById('loadOverlay');
      document.getElementById('loadP1').textContent = CHARS[finalP1].name;
      document.getElementById('loadP2').textContent = CHARS[finalP2].name;
      overlay.classList.add('show');

      /* Setup loading canvas */
      const lCv=document.getElementById('loadCv');
      const lCtx=lCv.getContext('2d');
      lCv.width=innerWidth; lCv.height=innerHeight;
      const LT0=Date.now();

      /* Animate loading bar */
      const bar=document.getElementById('loadBar');
      let prog=0;
      const barInterval=setInterval(()=>{
        prog=Math.min(100,prog+(100/90)); // fill in ~1.5s at 60fps
        bar.style.width=prog+'%';
        if(prog>=100){ clearInterval(barInterval); }
      },16);

      /* Draw two fighters fighting on load canvas */
      function drawLoadFrame(){
        const t=(Date.now()-LT0)*.001;
        lCtx.setTransform(1,0,0,1,0,0);
        lCtx.clearRect(0,0,innerWidth,innerHeight);

        /* Background pulse */
        const bg=lCtx.createRadialGradient(innerWidth/2,innerHeight/2,0,innerWidth/2,innerHeight/2,innerHeight);
        bg.addColorStop(0,'rgba(79,70,229,0.08)'); bg.addColorStop(1,'rgba(5,8,16,0)');
        lCtx.fillStyle=bg; lCtx.fillRect(0,0,innerWidth,innerHeight);

        const gy=innerHeight*.68, cL=innerWidth*.3, cR=innerWidth*.7;
        const c1=CHARS[finalP1], c2=CHARS[finalP2];

        /* Draw ground */
        const gl=lCtx.createLinearGradient(cL-150,gy,cR+150,gy);
        gl.addColorStop(0,'rgba(0,0,0,0)');gl.addColorStop(.3,hexA(c1.col,.6));
        gl.addColorStop(.7,hexA(c2.col,.6));gl.addColorStop(1,'rgba(0,0,0,0)');
        lCtx.strokeStyle=gl;lCtx.lineWidth=1.5;
        lCtx.beginPath();lCtx.moveTo(cL-150,gy);lCtx.lineTo(cR+150,gy);lCtx.stroke();

        /* Lightning arc between fighters (appears occasionally) */
        if(Math.sin(t*2.5)>0.7){
          const la=.5+Math.sin(t*9)*.3;
          lCtx.save();lCtx.globalAlpha=la;
          lCtx.strokeStyle='#c4b5fd';lCtx.lineWidth=1.8;
          lCtx.shadowBlur=16;lCtx.shadowColor='#7c3aed';
          lCtx.beginPath();
          let lx=cL,ly=gy-40;lCtx.moveTo(lx,ly);
          for(let i=0;i<6;i++){lx+=(cR-cL)/6+(Math.random()-.5)*30;ly+=(Math.random()-.5)*30;lCtx.lineTo(lx,ly);}
          lCtx.lineTo(cR,gy-40);lCtx.stroke();
          lCtx.restore();
        }

        /* Draw P1 fighter (left, facing right, doing attack) */
        drawLoadFighter(lCtx,cL,gy,c1,true,t);
        /* Draw P2 fighter (right, facing left = mirrored, guard) */
        drawLoadFighter(lCtx,cR,gy,c2,false,t+1.5);

        if(t<1.6) requestAnimationFrame(drawLoadFrame);
        else{
          SB.navigate(SB.getMode() === 'training' ? 'training.html' : 'battle.html');
        }
      }
      requestAnimationFrame(drawLoadFrame);
    }

    /* Simple fighter for loading screen */
    function drawLoadFighter(ctx,cx,gy,c,facingR,t){
      const SC=2.0, dir=facingR?1:-1;
      const bob=Math.sin(t*3)*5;
      const atk=Math.sin(t*4); // attack cycle

      ctx.save(); ctx.translate(cx,gy+bob);
      ctx.lineCap='round';

      /* Aura */
      const au=ctx.createRadialGradient(0,-15,4,0,-15,55*SC);
      au.addColorStop(0,hexA(c.col,.25));au.addColorStop(1,'rgba(0,0,0,0)');
      ctx.fillStyle=au;ctx.beginPath();ctx.arc(0,-15,55*SC,0,Math.PI*2);ctx.fill();

      ctx.scale(SC,SC);

      /* Legs */
      ctx.strokeStyle='#94a3b8';ctx.lineWidth=2.5;
      ln(ctx,0,14,dir*(-14+Math.sin(t*4)*10),50);
      ln(ctx,0,14,dir*(14-Math.sin(t*4)*10),50);

      /* Body */
      ctx.strokeStyle='#e2e8f0';ctx.lineWidth=2.5;ln(ctx,0,-15,0,14);

      /* Arms (attack motion) */
      const raA=facingR?(-0.4+atk*.6):(Math.PI+0.4-atk*.6);
      const raX=Math.cos(facingR?raA:raA)*24*dir;
      const raY=-8+Math.sin(facingR?raA:(raA-Math.PI))*24;
      ctx.strokeStyle='#cbd5e1';ctx.lineWidth=2.2;
      ln(ctx,0,-8,raX,raY);
      ln(ctx,0,-8,-raX*.4,raY*.5);

      /* Weapon tip */
      ctx.fillStyle=c.col;ctx.shadowBlur=16;ctx.shadowColor=c.col;
      ctx.beginPath();ctx.arc(raX+dir*10*Math.cos(facingR?raA:raA-Math.PI),raY+10*Math.sin(facingR?raA:raA-Math.PI),8,0,Math.PI*2);ctx.fill();
      ctx.shadowBlur=0;

      /* Head */
      ctx.strokeStyle=c.col;ctx.lineWidth=2.5;ctx.shadowBlur=10;ctx.shadowColor=c.col;
      circ(ctx,0,-30,13,'#0f172a');ctx.stroke();ctx.shadowBlur=0;
      ctx.fillStyle=c.col2;
      circ(ctx,dir*4,-32,2.5,c.col2);circ(ctx,dir*9,-32,2.5,c.col2);

      ctx.restore();
    }

    /* Expose to global scope ───────────────────── */
    window._startBattle   = startBattle;
    window._changeChar    = changeChar;
    window._randomChar    = randomChar;
    window._selectMap     = function(idx){ SB.setMap(idx); document.getElementById('mapOverlay').classList.remove('show'); _launchBattle(); };
    window._randomMap     = function(){ SB.setMap(-1); document.getElementById('mapOverlay').classList.remove('show'); _launchBattle(); };
    window._closeMapSelect= function(){ document.getElementById('mapOverlay').classList.remove('show'); };

    /* ── Keyboard ───────────────────────────────── */
    addEventListener('keydown',e=>{
      if(e.code==='ArrowLeft')  changeChar(-1);
      if(e.code==='ArrowRight') changeChar(1);
      if(e.code==='Enter'&&charState==='IDLE') selectChar(1,curIdx);
    });

    /* ── Init ───────────────────────────────────── */
    buildThumbs();
    showPanel(0);
    spawnParts(W*.7,H*.55,CHARS[0].col,8);

    /* ── Main render loop ───────────────────────── */
    function frame(){
      const t=sec();
      drawBG();

      /* Walk state machine */
      const tX=TARGET_X();
      if(charState==='ENTERING'){
        charX+=(tX-charX)*.1;
        if(Math.abs(charX-tX)<2){ charX=tX; charState='IDLE'; }
      } else if(charState==='EXITING'){
        const offX = exitDir>0 ? W*1.12 : W*(-0.12);
        charX+=(offX-charX)*.1;
        if(Math.abs(charX-offX)<10){
          curIdx=pendingIdx;
          charX = exitDir>0 ? W*(-0.12) : W*1.12;
          charState='ENTERING';
          showPanel(curIdx);
          updateThumbs();
          spawnParts(tX,H*.6,CHARS[curIdx].col,10);
          if(pendingSelectPlayer>0){
            selectChar(pendingSelectPlayer,curIdx);
            pendingSelectPlayer=-1;
          }
        }
      }

      /* Render */
      cCtx.setTransform(1,0,0,1,0,0);
      cCtx.clearRect(0,0,W,H);
      try{ drawStage(); }catch(e){}
      try{ drawChar(t); }catch(e){}

      /* Orb ambient particles */
      if(charState==='IDLE'&&t-lastPartT>.2&&Math.random()<.55){
        lastPartT=t;
        const c=CHARS[curIdx];
        const SC=3.0;
        const raA=-0.44+Math.sin(t*.75)*.07;
        const sX=Math.cos(raA)*(26+26)*SC, sY=H*.60+Math.sin(raA)*(26+26)*SC-30*SC;
        spawnParts(charX+sX,sY,c.col,1);
      }

      /* FX canvas */
      fxCtx.clearRect(0,0,W,H);
      for(let i=parts.length-1;i>=0;i--){
        const p=parts[i];p.x+=p.vx;p.y+=p.vy;p.vy+=p.grav;p.life++;
        if(p.life>p.max){parts.splice(i,1);continue;}
        const a=(1-p.life/p.max)*.9;
        fxCtx.save();fxCtx.globalAlpha=a;fxCtx.fillStyle=p.c;fxCtx.shadowBlur=8;fxCtx.shadowColor=p.c;
        fxCtx.beginPath();fxCtx.arc(p.x,p.y,p.r,0,Math.PI*2);fxCtx.fill();fxCtx.restore();
      }

      /* Cursor ring lag */
      ringX+=(mx-ringX)*.14; ringY+=(my-ringY)*.14;
      ring.style.left=ringX+'px'; ring.style.top=ringY+'px';

      requestAnimationFrame(frame);
    }
    frame();

  })();
  </script>

  <script>
  // Continue menu music if it was on in the main menu
  if (sessionStorage.getItem('sbMusicOn')) {
    MU.menu();
  }
  </script>
